name: mixer_sonca
description: "A new Flutter project for Sonca Mixer application"
version: 1.0.0+412003

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  provider: ^6.1.1
  get_it: ^7.6.6
  equatable: ^2.0.5
  flutter_blue_plus: ^1.34.0
  permission_handler: ^12.0.1
  http: ^1.1.0
  path_provider: ^2.1.2
  intl: ^0.19.0
  file_picker: ^8.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/app_icon.png"
  min_sdk_android: 21
